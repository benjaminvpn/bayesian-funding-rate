name: 贝叶斯费率信号

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  bayesian-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 安装依赖
        run: pip install numpy
      - name: 运行引擎
        run: python main.py
      - name: 提交结果
        run: |
          git config user.name "bayesian-bot"
          git config user.email "bot@github.com"
          git add output/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "🔄 信号更新 $(date +'%Y-%m-%d %H:%M')"
          git push 
